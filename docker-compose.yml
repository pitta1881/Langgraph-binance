services:
  web:
    build:
      context: .
      dockerfile: backend-node/Dockerfile
    ports:
      - "8000:8000"
    environment:
      NODE_ENV: production
      PORT: "8000"
      HOST: "0.0.0.0"
      PYTHON_AGENT_URL: "http://agent:8001"
      COINGECKO_API_KEY: "${COINGECKO_API_KEY:-}"
    depends_on:
      agent:
        condition: service_healthy

  agent:
    build:
      context: .
      dockerfile: agent_service/Dockerfile
    ports:
      - "8001:8001"
    environment:
      AI_API_KEY: "${AI_API_KEY}"
      AI_MODEL: "gemini-2.0-flash"
      LOG_LEVEL: "INFO"
    healthcheck:
      test: ["CMD", "python", "-c",
             "import urllib.request; urllib.request.urlopen('http://localhost:8001/health')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
